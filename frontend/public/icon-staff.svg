<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="#E8F5E9" stroke="#81C784" stroke-width="1.5"/>

  <!-- Head -->
  <circle cx="32" cy="18" r="8.5" fill="#FFCC80"/>

  <!-- Hair -->
  <path d="M23.5 16c0-5 4-9 8.5-9s8.5 4 8.5 9c0 0.8-0.3 1.2-1 1.2h-15c-0.7 0-1-0.4-1-1.2z" fill="#4E342E"/>

  <!-- Face features -->
  <circle cx="28.5" cy="18.5" r="1" fill="#4E342E"/>
  <circle cx="35.5" cy="18.5" r="1" fill="#4E342E"/>
  <path d="M30 22c0.5 1 3.5 1 4 0" stroke="#4E342E" stroke-width="0.8" fill="none" stroke-linecap="round"/>

  <!-- Doctor coat (white) -->
  <path d="M21 42v-7c0-6 5-10 11-10s11 4 11 10v7" fill="white" stroke="#E0E0E0" stroke-width="0.5"/>

  <!-- Coat lapels -->
  <path d="M29 25.5l3 4 3-4" stroke="#E0E0E0" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Coat center line -->
  <line x1="32" y1="29" x2="32" y2="42" stroke="#E0E0E0" stroke-width="0.8"/>

  <!-- Coat buttons -->
  <circle cx="32" cy="32" r="0.8" fill="#BDBDBD"/>
  <circle cx="32" cy="36" r="0.8" fill="#BDBDBD"/>
  <circle cx="32" cy="40" r="0.8" fill="#BDBDBD"/>

  <!-- Stethoscope -->
  <path d="M28 27c-3 2-5 5-5 8" stroke="#43A047" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M23 35c0 2 1 3.5 3 3.5s3-1.5 3-3.5" stroke="#43A047" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="26" cy="39" r="2" fill="#43A047"/>
  <circle cx="26" cy="39" r="0.8" fill="#2E7D32"/>

  <!-- Head mirror / reflector -->
  <circle cx="38" cy="12" r="3" fill="#E0E0E0" stroke="#BDBDBD" stroke-width="0.8"/>
  <circle cx="38" cy="12" r="1.5" fill="white"/>
  <path d="M35 12c0-2 1.5-4 3.5-4" stroke="#BDBDBD" stroke-width="0.8" fill="none"/>

  <!-- Pocket -->
  <rect x="34" y="33" width="5" height="4" rx="0.5" fill="none" stroke="#E0E0E0" stroke-width="0.6"/>
  <!-- Pen in pocket -->
  <line x1="36" y1="31.5" x2="36" y2="34" stroke="#1565C0" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Arms -->
  <path d="M21 32c-1 1-2 3-2 5v2" stroke="#FFCC80" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M43 32c1 1 2 3 2 5v2" stroke="#FFCC80" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Legs -->
  <rect x="26" y="42" width="4.5" height="9" rx="2" fill="#37474F"/>
  <rect x="33.5" y="42" width="4.5" height="9" rx="2" fill="#37474F"/>

  <!-- Shoes -->
  <ellipse cx="28.25" cy="51.5" rx="3" ry="1.5" fill="#263238"/>
  <ellipse cx="35.75" cy="51.5" rx="3" ry="1.5" fill="#263238"/>
</svg>
